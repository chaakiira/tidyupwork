<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>链接网盘</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f2f5f9;--card:#fff;--text:#333;--border:#e3e7ed;
  --btn:#007bff;--del:#ff3b30;--folder:#f8f9fa
}
body{
  font-family:微软雅黑,sans-serif;
  background:var(--bg);color:var(--text);padding:12px
}
.container{max-width:500px;margin:0 auto}
.header{
  display:flex;justify-content:space-between;align-items:center;
  margin-bottom:12px
}
.header h1{font-size:20px}
.btn{padding:8px 12px;border-radius:10px;background:var(--btn);color:white;text-decoration:none;font-size:14px}
.search-box{margin-bottom:12px}
.search-box input{
  width:100%;padding:12px 14px;border-radius:12px;
  border:1px solid var(--border);background:var(--card);
  color:var(--text);font-size:16px
}
.card{
  background:var(--card);border-radius:14px;padding:14px;
  margin-bottom:12px;box-shadow:0 2px 8px rgba(0,0,0,0.1)
}
.folder{
  font-weight:600;padding:12px;background:var(--folder);
  border-radius:10px;margin-bottom:8px
}
.link-item{
  display:flex;flex-wrap:wrap;align-items:center;padding:10px 0;
  border-bottom:1px solid var(--border);gap:8px
}
.link-info{flex:1;min-width:0}
.link-name{font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.link-author{font-size:13px;color:#888}
.link-item a{color:var(--btn);text-decoration:none}
.link-chapters{display:flex;flex-wrap:wrap;gap:4px;margin-top:4px}
.chip{
  font-size:12px;padding:2px 6px;border-radius:6px;
  background:var(--folder);color:var(--text)
}
.edit,.move,.del{font-size:14px;padding:4px 6px}
.edit{color:#007bff}
.move{color:#ff9500}
.del{color:var(--del)}
.handle{cursor:move;color:#999;padding:0 4px}
.hidden{display:none}
.loading{text-align:center;padding:20px}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>🔗 链接网盘</h1>
    <a class="btn" href="add.html">➕ 添加链接</a>
  </div>

  <div class="search-box">
    <input type="text" id="search" placeholder="🔍 搜索标题/作者/章节..." oninput="search()">
  </div>

  <div id="loading" class="loading">云端加载中...</div>
  <div id="list"></div>
</div>

<script>
const GITHUB_USER = "chaakiira";
const GITHUB_REPO = "tidyupwork";
const GITHUB_TOKEN = "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";
const FILE_PATH = "data.json";

let data = { folders: [], links: [] };

async function loadData() {
  try {
    const res = await fetch(`https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/${FILE_PATH}`);
    const json = await res.json();
    const raw = decodeURIComponent(escape(atob(json.content)));
    data = JSON.parse(raw);
    render();
    document.getElementById("loading").style.display = "none";
  } catch (e) {
    data = { folders: [{ id: 1, name: "默认文件夹" }], links: [] };
    await saveData("初始化");
    render();
    document.getElementById("loading").style.display = "none";
  }
}

async function saveData(msg = "更新") {
  const res = await fetch(`https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/${FILE_PATH}`);
  let sha = "";
  if (res.ok) {
    const j = await res.json();
    sha = j.sha;
  }
  const str = JSON.stringify(data, null, 2);
  const content = btoa(unescape(encodeURIComponent(str)));

  await fetch(`https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/${FILE_PATH}`, {
    method: "PUT",
    headers: {
      "Authorization": "token " + GITHUB_TOKEN,
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ message: msg, content: content, sha: sha })
  });
}

function delLink(id) {
  if (!confirm("确定删除？")) return;
  data.links = data.links.filter(l => l.id !== id);
  saveData("删除链接");
  render();
}

function editLink(id) {
  const link = data.links.find(l => l.id === id);
  const name = prompt("修改标题", link.name);
  if (!name?.trim()) return;
  const author = prompt("修改作者", link.author || "");
  link.name = name.trim();
  link.author = author?.trim() || "";
  saveData("编辑");
  render();
}

function moveLink(id) {
  const link = data.links.find(l => l.id === id);
  const list = data.folders.map(f => `${f.id}：${f.name}`).join("\n");
  const to = prompt(`移动到文件夹ID\n${list}`, link.fid);
  if (!to) return;
  const fid = Number(to);
  if (data.folders.some(f => f.id === fid)) {
    link.fid = fid;
    saveData("移动");
    render();
  } else {
    alert("文件夹不存在");
  }
}

function search() {
  const kw = document.getElementById("search").value.toLowerCase();
  document.querySelectorAll(".link-item").forEach(i => {
    const t = (i.dataset.name + " " + i.dataset.author + " " + (i.dataset.chapters || "")).toLowerCase();
    i.classList.toggle("hidden", kw && !t.includes(kw));
  });
}

function render() {
  const list = document.getElementById("list");
  list.innerHTML = "";
  data.folders.forEach(f => {
    const card = document.createElement("div");
    card.className = "card";
    card.innerHTML = `<div class="folder">📁 ${f.name}</div>`;
    const items = data.links.filter(l => l.fid === f.id);
    items.forEach(l => {
      const chs = l.chapters ? l.chapters.join(" ") : "";
      card.innerHTML += `
      <div class="link-item" data-id="${l.id}" data-name="${l.name}" data-author="${l.author || ''}" data-chapters="${chs}">
        <span class="handle">☰</span>
        <div class="link-info">
          <div class="link-name"><a href="${l.url}" target="_blank">${l.name}</a></div>
          ${l.author ? `<div class="link-author">作者：${l.author}</div>` : ""}
          ${l.chapters && l.chapters.length ? `
          <div class="link-chapters">
            ${l.chapters.map(ch => `<span class="chip">第${ch}章</span>`).join("")}
          </div>` : ""}
        </div>
        <span class="edit" onclick="editLink(${l.id})">编辑</span>
        <span class="move" onclick="moveLink(${l.id})">移动</span>
        <span class="del" onclick="delLink(${l.id})">删除</span>
      </div>`;
    });
    list.appendChild(card);
  });
}

loadData();
</script>
</body>
</html>
