<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>目录</title>
<style>
body{background:#f5f6f8;font-family:微软雅黑;margin:0;padding:12px;}
.box{background:#fff;border-radius:12px;padding:15px;margin-bottom:10px;}
.folder{font-size:16px;font-weight:bold;margin-bottom:8px;}
.item{padding:6px 0;border-bottom:1px solid #eee;}
a{color:#007aff;text-decoration:none;}
.bar{display:flex;gap:10px;margin-bottom:15px;}
.btn{padding:6px 12px;background:#007aff;color:#fff;border-radius:6px;}
</style>
</head>
<body>

<div class="bar">
  <a class="btn" href="add.html">新建文件夹/添加</a>
</div>
<div id="wrap"></div>

<script>
// 本地永久储存
const KEY = "dataList";
let data = JSON.parse(localStorage.getItem(KEY)) || {
  folders: [{id:1,name:"默认文件夹"}],
  links:[]
};

function save(){
  localStorage.setItem(KEY, JSON.stringify(data));
}

function render(){
  let html = "";
  data.folders.forEach(f=>{
    html += `<div class="box">
      <div class="folder">📁 ${f.name}</div>`;
    data.links.filter(x=>x.fid===f.id).forEach(link=>{
      html += `<div class="item">
        <a href="${link.url}" target="_blank">${link.name}</a>
      </div>`;
    })
    html += `</div>`;
  })
  document.getElementById("wrap").innerHTML = html;
}

render();
</script>
</body>
</html>
