<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>添加</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#f2f5f9;font-family:微软雅黑;padding:12px}
.container{max-width:500px;margin:0 auto}
.header{display:flex;justify-content:space-between;margin-bottom:15px}
.btn{padding:8px 12px;background:#007bff;color:#fff;border-radius:10px;text-decoration:none}
.card{background:#fff;border-radius:14px;padding:15px;margin-bottom:15px}
input,button{width:100%;padding:12px;border-radius:10px;border:1px solid #ddd;margin:6px 0}
button{background:#007bff;color:#fff;border:none;cursor:pointer}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h2>新建/添加</h2>
    <a class="btn" href="index.html">← 返回</a>
  </div>

  <div class="card">
    <h4>📁 新建文件夹</h4>
    <input id="fname" placeholder="文件夹名">
    <button onclick="addFolder()">创建</button>
  </div>

  <div class="card">
    <input id="title" placeholder="标题">
    <input id="url" placeholder="链接">
    <button onclick="addLink()">保存链接</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const supabase = supabase.createClient(
  "https://qkrpmoxeqakrwbqndbgg.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFrcnBtb3hlcWFrcndicW5kYnFnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY5NTQwNTAsImV4cCI6MjA5MjUzMDA1MH0.U839r7rZSpC6WpzsvGQx-dum0gacakUsBzyaSSs4XVw"
);

// 修复版：直接写死，保证点击能触发
async function addFolder() {
  const name = document.getElementById('fname').value.trim();
  if (!name) {
    alert('请输入文件夹名称');
    return;
  }
  try {
    const { error } = await supabase.from('folders').insert([{ name }]);
    if (error) throw error;
    alert('✅ 创建成功！云端已保存');
    document.getElementById('fname').value = '';
  } catch (err) {
    alert('创建失败：' + err.message);
  }
}

async function addLink() {
  const name = document.getElementById('title').value.trim();
  const url = document.getElementById('url').value.trim();
  if (!name || !url) {
    alert('标题和链接不能为空');
    return;
  }
  try {
    // 自动找第一个文件夹，保证能存进去
    const { data: folders, error: fErr } = await supabase.from('folders').select('id').limit(1);
    if (fErr) throw fErr;
    const folderId = folders?.[0]?.id || 1;

    const { error } = await supabase.from('links').insert([{ folder_id: folderId, name, url }]);
    if (error) throw error;

    alert('保存成功！返回首页查看');
    location.href = 'index.html';
  } catch (err) {
    alert('保存失败：' + err.message);
  }
}
</script>
</body>
</html>
