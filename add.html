<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>新建</title>
<style>
body{padding:15px;font-family:微软雅黑;background:#f5f6f8;}
.box{background:#fff;border-radius:12px;padding:15px;margin-bottom:15px;}
input,button{width:100%;box-sizing:border-box;padding:10px;margin:6px 0;border-radius:6px;border:1px #ddd solid;}
button{background:#007aff;color:#fff;border:none;}
a{color:#007aff;}
</style>
</head>
<body>

<a href="index.html">← 返回首页</a>

<div class="box">
  <h4>新建文件夹</h4>
  <input id="fname" placeholder="输入文件夹名称">
  <button onclick="addFolder()">确认创建</button>
</div>

<script>
const KEY = "dataList";
let data = JSON.parse(localStorage.getItem(KEY)) || {
  folders: [{id:1,name:"默认文件夹"}],
  links:[]
};

function save(){
  localStorage.setItem(KEY, JSON.stringify(data));
}

// 核心：新建文件夹 百分百本地保存
function addFolder(){
  let name = document.getElementById("fname").value.trim();
  if(!name){
    alert("请输入名称");
    return;
  }
  data.folders.push({
    id: Date.now(),
    name: name
  });
  save();   // 强制本地保存
  alert("创建成功！刷新也不会丢！");
  document.getElementById("fname").value = "";
}
</script>

</body>
</html>
