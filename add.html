<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>添加内容 | 新建文件夹</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:微软雅黑,sans-serif;background:#f2f5f9;padding:12px}
.container{max-width:500px;margin:0 auto}
.header{display:flex;justify-content:space-between;align-items:center;margin-bottom:15px}
.btn{padding:8px 12px;background:#007bff;color:#fff;border-radius:10px;text-decoration:none;border:0}
.card{background:#fff;border-radius:14px;padding:15px;margin-bottom:15px}
input,select,button{width:100%;padding:12px;border-radius:10px;border:1px solid #ddd;margin:6px 0}
button{background:#007bff;color:#fff;border:none}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h2>新建 / 添加</h2>
    <a class="btn" href="index.html">← 返回网盘</a>
  </div>

  <!-- ============== 你要的【创建文件夹】在这里 ============== -->
  <div class="card">
    <h4>📁 新建文件夹</h4>
    <input type="text" id="newFolderName" placeholder="输入文件夹名称">
    <button onclick="createFolder()">确认创建</button>
  </div>

  <div class="card">
    <h4>🔗 添加链接</h4>
    <input type="text" id="linkName" placeholder="标题">
    <input type="text" id="linkAuthor" placeholder="作者（选填）">
    <input type="url" id="linkUrl" placeholder="链接地址">
    <select id="folderSelect"></select>
    <button onclick="addLink()">保存链接</button>
  </div>
</div>

<script>
const GITHUB_USER = "chaakiira";
const GITHUB_REPO = "tidyupwork";
// 👉 同样粘贴你的Token
const GITHUB_TOKEN = "你的Token";
const FILE_PATH = "data.json";

let data = {};

// 读取云端数据
async function loadData(){
  const res = await fetch(`https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/${FILE_PATH}`);
  const json = await res.json();
  const raw = atob(json.content);
  data = JSON.parse(decodeURIComponent(escape(raw)));
  renderFolderSelect();
}

// 刷新文件夹下拉列表
function renderFolderSelect(){
  const sel = document.getElementById("folderSelect");
  sel.innerHTML = "";
  data.folders.forEach(f=>{
    sel.innerHTML += `<option value="${f.id}">${f.name}</option>`;
  });
}

// ========== 重点：创建文件夹函数 ==========
async function createFolder(){
  let name = document.getElementById("newFolderName").value.trim();
  if(!name){
    alert("请输入文件夹名称");
    return;
  }
  // 生成唯一ID
  let newId = Date.now();
  data.folders.push({
    id: newId,
    name: name
  });
  // 保存到云端
  await saveData("新建文件夹："+name);
  document.getElementById("newFolderName").value = "";
  renderFolderSelect();
  alert("✅ 文件夹创建成功，所有人同步可见！");
}

// 添加链接
async function addLink(){
  let name = document.getElementById("linkName").value.trim();
  let author = document.getElementById("linkAuthor").value.trim();
  let url = document.getElementById("linkUrl").value.trim();
  let fid = Number(document.getElementById("folderSelect").value);
  if(!name || !url){
    alert("标题和链接不能为空");
    return;
  }
  data.links.push({
    id: Date.now(),
    name: name,
    author: author,
    url: url,
    fid: fid
  });
  await saveData("添加新链接");
  alert("保存成功");
  location.href = "index.html";
}

// 云端保存
async function saveData(msg){
  const res = await fetch(`https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/${FILE_PATH}`);
  let sha = "";
  if(res.ok){
    let j = await res.json();
    sha = j.sha;
  }
  const str = JSON.stringify(data,null,2);
  const encodeStr = unescape(encodeURIComponent(str));
  const content = btoa(encodeStr);

  await fetch(`https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/${FILE_PATH}`,{
    method:"PUT",
    headers:{
      "Authorization":"token "+GITHUB_TOKEN,
      "Content-Type":"application/json"
    },
    body:JSON.stringify({
      message:msg,
      content:content,
      sha:sha
    })
  });
}

// 初始化
loadData();
</script>
</body>
</html>
